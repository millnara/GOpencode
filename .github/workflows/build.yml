name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - uses: actions/setup-java@v4
        with: { distribution: "temurin", java-version: "17" }

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
      - run: npx cap sync android

      - name: Build APK
        run: cd android && ./gradlew assembleDebug
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          ANDROID_HOME: /usr/local/lib/android/sdk

      - uses: actions/upload-artifact@v4
        with:
          name: gopencode-android-${{ github.ref_name }}
          path: android/app/build/outputs/apk/debug/app-debug.apk

  desktop:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.23" }

      - name: Build Go binary
        run: cd desktop && go build -ldflags="-s -w" -o gopencode.exe .
        shell: bash

      - name: Build NSIS installer
        run: cd desktop && makensis installer.nsi
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: gopencode-desktop-${{ github.ref_name }}
          path: desktop/dist/GOpencode-Setup-*.exe

  release:
    needs: [android, desktop]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with: { pattern: "gopencode-*", merge-multiple: true, path: artifacts }

      - run: ls -lh artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
