<html><body><pre id="log" style="font:14px monospace;padding:10px"></pre>
<script>
var e=document.getElementById("log");
function log(s){e.textContent+=s+"\n"}
log("Testing ws://192.168.4.31:8765...");
var ws=new WebSocket("ws://192.168.4.31:8765");
var connected=false;
ws.onopen=function(){log("OPEN - sending auth");ws.send(JSON.stringify({type:"auth",room:"4091db09770274bd",pw:"2ukRSZNZgoCxb1Bs",id:-1}));};
ws.onmessage=function(m){
  var msg=JSON.parse(m.data);
  if(msg.type==="authed"){log("AUTHED - SUCCESS");connected=true;}
  else if(msg.type==="webrtc-offer")log("WebRTC offer received");
  else if(msg.type==="webrtc-candidate")log("ICE candidate");
  else log("MSG: "+m.data.substring(0,200));
};
ws.onerror=function(){log("ERROR");};
ws.onclose=function(ev){log("CLOSE code="+ev.code+" connected="+connected);};
setTimeout(function(){if(!connected)log("FAILED - no auth within 5s");},5000);
</script></body></html>
